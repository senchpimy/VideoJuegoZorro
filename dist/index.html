    <script>
        // Fullscreen logic
        document.querySelector("#unity-fullscreen-button").onclick = () => {
            const container = document.querySelector("#unity-container");
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    alert(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        };

        // Simplified loading timer (3.5s)
        (function() {
            const loadingBar = document.getElementById('unity-loading-bar');
            const progressFull = document.getElementById('unity-progress-bar-full');
            
            setTimeout(() => { if (progressFull) progressFull.style.width = "40%"; }, 500);
            setTimeout(() => { if (progressFull) progressFull.style.width = "70%"; }, 1500);
            setTimeout(() => { if (progressFull) progressFull.style.width = "100%"; }, 2500);

            setTimeout(() => {
                if (loadingBar) loadingBar.style.display = 'none';
            }, 3500);
        })();

        // Audio context resumption proxy
        (function () {
            const audioContextList = [];
            const userInputEventNames = ["click", "keydown", "touchstart"];

            const OriginalAudioContext = self.AudioContext || self.webkitAudioContext;
            if (OriginalAudioContext) {
                self.AudioContext = new Proxy(OriginalAudioContext, {
                    construct(target, args) {
                        const result = new target(...args);
                        audioContextList.push(result);
                        return result;
                    },
                });
            }

            function resumeAllContexts(_event) {
                audioContextList.forEach((context) => {
                    if (context.state !== "running") context.resume();
                });
            }

            userInputEventNames.forEach((eventName) => {
                document.addEventListener(eventName, resumeAllContexts);
            });
        })();
    </script>

    class Overlay {
        constructor() {

            this._title.prepend(icon);

            container.append(this._title, this._message);
            this._overlay.append(container);

            this._inject();
            window.setInterval(() => {
                this._inject();
            }, 250);
        }

        set reason(reason) {

        _inject() {
            if (!this._overlay.isConnected) {
                // prepend it
                document.body?.prepend(this._overlay);
            }
        }

    }

    class Client {
        constructor(url) {
            this.url = url;
            this.poll_interval = 5000;
            this._overlay = null;
        }

        start() {
            const ws = new WebSocket(this.url);
            ws.onmessage = (ev) => {
                const msg = JSON.parse(ev.data);
                switch (msg.type) {
                    case "reload":
                        this.reload();
                        break;
                    case "buildFailure":
                        this.buildFailure(msg.data)
                        break;
                }
            };
            ws.onclose = () => this.onclose();
        }

        onclose() {
            window.setTimeout(
                () => {
                    // when we successfully reconnect, we'll force a
                    // reload (since we presumably lost connection to
                    // trunk due to it being killed, so it will have
                    // rebuilt on restart)
                    const ws = new WebSocket(this.url);
                    ws.onopen = () => window.location.reload();
                    ws.onclose = () => this.onclose();
                },
                this.poll_interval);
        }

        reload() {
            window.location.reload();
        }

        buildFailure({reason}) {
            // also log the console
            console.error("Build failed:", reason);

            console.debug("Overlay", this._overlay);

            if (!this._overlay) {
                this._overlay = new Overlay();
            }
            this._overlay.reason = reason;
        }
    }

    new Client(url).start();
