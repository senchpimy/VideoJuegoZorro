<body>
    <div id="loading">Cargando...</div>
    <canvas id="bevy"></canvas>

    <script>
        // Hide loading when the canvas gets created
        const observer = new MutationObserver((mutations) => {
            const canvas = document.querySelector('canvas');
            if (canvas) {
                const loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';
                observer.disconnect();
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });

        // Audio context resumption proxy for Bevy/WebGL
        (function () {
            const audioContextList = [];
            const userInputEventNames = [
                "click", "contextmenu", "auxclick", "dblclick", "mousedown",
                "mouseup", "pointerup", "touchend", "keydown", "keyup",
            ];

            const OriginalAudioContext = self.AudioContext || self.webkitAudioContext;
            if (OriginalAudioContext) {
                self.AudioContext = new Proxy(OriginalAudioContext, {
                    construct(target, args) {
                        const result = new target(...args);
                        audioContextList.push(result);
                        return result;
                    },
                });
            }

            function resumeAllContexts(_event) {
                let allResumed = true;
                audioContextList.forEach((context) => {
                    if (context.state !== "running") {
                        context.resume();
                        allResumed = false;
                    }
                });

                if (allResumed && audioContextList.length > 0) {
                    userInputEventNames.forEach((eventName) => {
                        document.removeEventListener(eventName, resumeAllContexts);
                    });
                }
            }

            userInputEventNames.forEach((eventName) => {
                document.addEventListener(eventName, resumeAllContexts);
            });
        })();
    </script>
